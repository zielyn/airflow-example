services:
  postgres:
    image: public.ecr.aws/docker/library/postgres:17
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    # No volume mount — database is ephemeral and always starts clean.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        AIRFLOW_VERSION: ${AIRFLOW_VERSION:-3.0.6}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    volumes:
      - ../dags:/opt/airflow/dags
      - ../plugins:/opt/airflow/plugins
      - ../requirements:/opt/airflow/requirements
    command: db migrate

  test-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        AIRFLOW_VERSION: ${AIRFLOW_VERSION:-3.0.6}
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      PYTHONPATH: /opt/airflow/dags
    volumes:
      - ../dags:/opt/airflow/dags
      - ../plugins:/opt/airflow/plugins
      - ../requirements:/opt/airflow/requirements
      - ../tests:/opt/airflow/tests
    working_dir: /opt/airflow
    command: >
      bash -c "pip install pytest --quiet && pytest tests/ -v"
